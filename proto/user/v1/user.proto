syntax = "proto3";

package user.v1;

option go_package = "github.com/relay-im/relay/shared/proto/gen/user/v1;userv1";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc SetStatus(SetStatusRequest) returns (SetStatusResponse);
}

message User {
  string id           = 1;
  string email        = 2;
  string display_name = 3;
  string avatar_url   = 4;
  string status_text  = 5;
  string status_emoji = 6;
  int64  created_at   = 7;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message UpdateProfileRequest {
  string user_id      = 1;
  string display_name = 2;
  string avatar_url   = 3;
}

message UpdateProfileResponse {
  User user = 1;
}

message SetStatusRequest {
  string user_id      = 1;
  string status_text  = 2;
  string status_emoji = 3;
}

message SetStatusResponse {}
