name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Go: Lint ──────────────────────────────────────────────────────────────────
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m ./services/... ./packages/...

  # ── Go: Test ──────────────────────────────────────────────────────────────────
  test-go:
    name: Test Go
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     relay_test
          POSTGRES_PASSWORD: relay_test
          POSTGRES_DB:       relay_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST:     localhost
      POSTGRES_PORT:     5432
      POSTGRES_USER:     relay_test
      POSTGRES_PASSWORD: relay_test
      POSTGRES_DB:       relay_test
      REDIS_URL:         redis://localhost:6379
      JWT_SECRET:        ci_test_secret_min_32_characters_long

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./services/... ./packages/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
        continue-on-error: true

  # ── Dart: Lint ────────────────────────────────────────────────────────────────
  lint-dart:
    name: Lint Dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: cd apps/flutter && flutter pub get

      - name: dart format check
        run: cd apps/flutter && dart format --output=none --set-exit-if-changed .

      - name: flutter analyze
        run: cd apps/flutter && flutter analyze

  # ── Dart: Test ────────────────────────────────────────────────────────────────
  test-dart:
    name: Test Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: cd apps/flutter && flutter pub get

      - name: Run tests
        run: cd apps/flutter && flutter test --coverage

  # ── Docker: Build ─────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - auth
          - api
          - messaging
          - notification
          - search
          - file
          - integration
          - media
          - federation
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/therelayproject/relay/${{ matrix.service }}:latest
            ghcr.io/therelayproject/relay/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}
