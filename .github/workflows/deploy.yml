name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: Image tag to deploy (defaults to latest)
        required: false
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/relay

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.3.0

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag in kustomize overlay
        working-directory: k8s/overlays/${{ github.event.inputs.environment }}
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          SERVICES=(
            auth-service
            user-service
            workspace-service
            channel-service
            message-service
            ws-gateway
            presence-service
            notification-service
            search-service
            file-service
          )
          for SERVICE in "${SERVICES[@]}"; do
            kustomize edit set image \
              "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${SERVICE}=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${SERVICE}:${IMAGE_TAG}"
          done

      - name: Apply kustomize overlay
        run: |
          kustomize build k8s/overlays/${{ github.event.inputs.environment }} | kubectl apply -f -

      - name: Wait for rollout — auth-service
        run: kubectl rollout status deployment/auth-service --timeout=5m

      - name: Wait for rollout — user-service
        run: kubectl rollout status deployment/user-service --timeout=5m

      - name: Wait for rollout — workspace-service
        run: kubectl rollout status deployment/workspace-service --timeout=5m

      - name: Wait for rollout — channel-service
        run: kubectl rollout status deployment/channel-service --timeout=5m

      - name: Wait for rollout — message-service
        run: kubectl rollout status deployment/message-service --timeout=5m

      - name: Wait for rollout — ws-gateway
        run: kubectl rollout status deployment/ws-gateway --timeout=5m

      - name: Wait for rollout — presence-service
        run: kubectl rollout status deployment/presence-service --timeout=5m

      - name: Wait for rollout — notification-service
        run: kubectl rollout status deployment/notification-service --timeout=5m

      - name: Wait for rollout — search-service
        run: kubectl rollout status deployment/search-service --timeout=5m

      - name: Wait for rollout — file-service
        run: kubectl rollout status deployment/file-service --timeout=5m

      - name: Deployment summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ github.event.inputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
