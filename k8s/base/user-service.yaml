apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: relay
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
    - name: grpc
      port: 9002
      targetPort: 9002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: relay
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: relay/user-service:latest
          ports:
            - name: http
              containerPort: 8002
            - name: grpc
              containerPort: 9002
          envFrom:
            - configMapRef:
                name: relay-config
            - secretRef:
                name: relay-secrets
          env:
            - name: HTTP_PORT
              value: "8002"
            - name: GRPC_PORT
              value: "9002"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 15
