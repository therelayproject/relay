apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: relay
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: grpc
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: relay
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: relay/auth-service:latest
          ports:
            - name: http
              containerPort: 8001
            - name: grpc
              containerPort: 9001
          envFrom:
            - configMapRef:
                name: relay-config
            - secretRef:
                name: relay-secrets
          env:
            - name: HTTP_PORT
              value: "8001"
            - name: GRPC_PORT
              value: "9001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
