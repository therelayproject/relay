apiVersion: v1
kind: Service
metadata:
  name: presence-service
  namespace: relay
spec:
  selector:
    app: presence-service
  ports:
    - name: http
      port: 8007
      targetPort: 8007
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presence-service
  namespace: relay
  labels:
    app: presence-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presence-service
  template:
    metadata:
      labels:
        app: presence-service
    spec:
      containers:
        - name: presence-service
          image: relay/presence-service:latest
          ports:
            - name: http
              containerPort: 8007
          envFrom:
            - configMapRef:
                name: relay-config
            - secretRef:
                name: relay-secrets
          env:
            - name: HTTP_PORT
              value: "8007"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8007
            initialDelaySeconds: 30
            periodSeconds: 15
