apiVersion: v1
kind: Service
metadata:
  name: ws-gateway
  namespace: relay
spec:
  selector:
    app: ws-gateway
  ports:
    - name: http
      port: 8006
      targetPort: 8006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-gateway
  namespace: relay
  labels:
    app: ws-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ws-gateway
  template:
    metadata:
      labels:
        app: ws-gateway
    spec:
      containers:
        - name: ws-gateway
          image: relay/ws-gateway:latest
          ports:
            - name: http
              containerPort: 8006
          envFrom:
            - configMapRef:
                name: relay-config
            - secretRef:
                name: relay-secrets
          env:
            - name: HTTP_PORT
              value: "8006"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8006
            initialDelaySeconds: 30
            periodSeconds: 15
