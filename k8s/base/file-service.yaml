apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: relay
spec:
  selector:
    app: file-service
  ports:
    - name: http
      port: 8010
      targetPort: 8010
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: relay
  labels:
    app: file-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
        - name: file-service
          image: relay/file-service:latest
          ports:
            - name: http
              containerPort: 8010
          envFrom:
            - configMapRef:
                name: relay-config
            - secretRef:
                name: relay-secrets
          env:
            - name: HTTP_PORT
              value: "8010"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8010
            initialDelaySeconds: 30
            periodSeconds: 15
