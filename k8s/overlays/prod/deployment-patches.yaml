---
# auth-service: 3 replicas (critical), high resource limits
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: relay
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
