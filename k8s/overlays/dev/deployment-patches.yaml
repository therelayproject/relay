---
# auth-service: 1 replica, low resource limits, debug logging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: relay
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: LOG_LEVEL
              value: "debug"
---
