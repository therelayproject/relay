name: relay
description: Open-source, self-hosted team chat with cross-org federation.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP client
  dio: ^5.4.3+1

  # WebSocket
  web_socket_channel: ^2.4.5

  # Local database (offline cache)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage (JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Push notifications
  firebase_messaging: ^15.0.4
  firebase_core: ^3.3.0

  # File handling
  file_picker: ^8.0.6

  # Image
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0

  # Markdown rendering
  flutter_markdown: ^0.7.1

  # Emoji
  emoji_picker_flutter: ^2.2.0

  # Virtual scroll (message list)
  scrollable_positioned_list: ^0.3.8

  # Permissions (mic, camera)
  permission_handler: ^11.3.1

  # WebRTC (voice & video — Phase 5)
  livekit_client: ^2.1.5

  # Misc
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
